#include <WiFi.h>
#include <WebServer.h> // Ajout de la librairie serveur web
#include <OneWire.h>
#include <DallasTemperature.h>
#include <PID_v1.h>


// --- CONFIGURATION WI-FI ---
const char* ssid = "VOTRE_SSID";
const char* password = "VOTRE_MOT_DE_PASSE";

// Définition du serveur sur le port 80
WebServer server(80);

//PIN GAUCHE
#define ONE_WIRE_BUS 15
#define FAN_PIN  2
#define RES_PIN  12

// Setup a oneWire instance to communicate with any OneWire devices
OneWire oneWire(ONE_WIRE_BUS);

// Pass our oneWire reference to Dallas Temperature.
DallasTemperature sensors(&oneWire);

// Parameters for PID
double Setpoint, Input, Output;
// Les coefficients PID peuvent être ajustés, ici un exemple
double Kp=2, Ki=5, Kd=1; 
PID PID_hot(&Input, &Output, &Setpoint, Kp, Ki, Kd, DIRECT);

// --- Fonctions de lecture et PID (de votre code) ---

double readTemperature() {
    sensors.requestTemperatures(); 
    double val = 0;
    // ATTENTION : Assurez-vous d'avoir réellement 3 capteurs pour cette moyenne
    // Sinon, ajustez la boucle et la division
    for (int sensorIndex = 0; sensorIndex < 3; sensorIndex++) { 
        val += sensors.getTempCByIndex(sensorIndex); 
    }
    val /= 3.0; // Moyenne des températures lues
    Serial.print("Temp Moyenne: ");
    Serial.println(val);
    return val;
}

bool PID_update() {
    Input = readTemperature(); // Lecture de la température actuelle
    PID_hot.Compute();
    
    // Utilisation du PID en mode ON/OFF simple (hystérésis)
    bool Output_bool;
    if (Output > 50) { // Si la commande PID est élevée, on chauffe
        Output_bool = true; 
    } else {
        Output_bool = false;
    }
    
    Serial.print("PID Output: ");
    Serial.println(Output);
    
    return Output_bool;
} 

// --- Fonctions de gestion du Serveur Web ---

// Fonction pour générer et envoyer la page HTML
void handleRoot() {
    // La température actuelle (Input) est mise à jour dans la loop via PID_update()
    
    String html = 
      "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Contrôle PID ESP32</title>"
      "<meta name='viewport' content='width=device-width, initial-scale=1.0'>"
      "<meta http-equiv='refresh' content='5'>" // Rafraîchit la page toutes les 5 secondes
      "<style>"
      "body{font-family: sans-serif; text-align: center; margin-top: 50px;}"
      ".data{font-size: 1.5em; margin: 15px; padding: 10px; border: 1px solid #ccc; display: inline-block;}"
      "</style>"
      "</head><body>"
      "<h1>Régulation de Température ESP32</h1>"

      "<div class='data'>Température Actuelle : <strong>" + String(Input, 1) + " °C</strong></div>"
      "<div class='data'>Consigne Actuelle : <strong>" + String(Setpoint, 1) + " °C</strong></div>"
      
      "<hr><h2>Modifier la Consigne :</h2>"
      // Le formulaire envoie la nouvelle valeur à la route /setpoint
      "<form action='/setpoint' method='GET'>" 
      "<input type='number' name='value' step='0.1' min='10' max='50' value='" + String(Setpoint, 1) + "'>"
      "<input type='submit' value='Appliquer Consigne'>"
      "</form>"

      "</body></html>";
    
    server.send(200, "text/html", html);
}

// Fonction pour traiter la nouvelle consigne reçue
void handleSetPoint() {
    if (server.hasArg("value")) { // Vérifie si le paramètre 'value' est présent
        String valueStr = server.arg("value");
        float nouvelleConsigne = valueStr.toFloat(); 

        // Validation de la nouvelle valeur (entre 10 et 50)
        if (nouvelleConsigne >= 10.0 && nouvelleConsigne <= 50.0) {
            Setpoint = (double)nouvelleConsigne; // Mise à jour de la variable PID Setpoint
            Serial.print("NOUVELLE CONSIGNE : ");
            Serial.println(Setpoint);
        }
    }
    
    // Redirection vers la page principale après modification
    server.sendHeader("Location", "/");
    server.send(302, "text/plain", "Consigne modifiée");
}

void setup(void)
{
    // Initialisation Série
    Serial.begin(115200); // Utilisez un baud rate plus rapide pour le debugging

    // Configuration des PINS
    pinMode(FAN_PIN, OUTPUT);
    pinMode(RES_PIN, OUTPUT);
    
    // Démarrage des capteurs
    sensors.begin();
    
    // --- 1. Démarrage du WIFI ---
    WiFi.begin(ssid, password);
    while (WiFi.status() != WL_CONNECTED) {
        delay(500);
        Serial.print(".");
    }
    Serial.println("\nConnecté au Wi-Fi!");
    Serial.print("Adresse IP : ");
    Serial.println(WiFi.localIP());

    // --- 2. Configuration du Serveur Web ---
    server.on("/", HTTP_GET, handleRoot);      // Route pour la page principale
    server.on("/setpoint", HTTP_GET, handleSetPoint); // Route pour le formulaire
    server.begin();
    Serial.println("Serveur Web démarré.");

    // --- 3. Démarrage du PID ---
    Setpoint = 35.0; // Consigne initiale
    // Démarrez en lisant la température pour initialiser 'Input'
    Input = readTemperature(); 
    PID_hot.SetMode(AUTOMATIC);
    Serial.println("Start loop");
}


void loop() {
    // L'ESP32 doit gérer les requêtes web régulièrement
    server.handleClient();
    
    // Mise à jour de la régulation PID
    bool pid_value = PID_update();
    
    // Contrôle de la résistance (RES_PIN)
    digitalWrite(RES_PIN, pid_value);
    
    // Note : Le délai est essentiel mais doit être court (ou utiliser un système de timer)
    // Le PID_v1.h gère lui-même son propre intervalle de calcul.
    delay(500); 
}